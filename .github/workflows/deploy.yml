name: Deploy

# Push to main → build the image in CI → push to GHCR → roll it out on the
# droplet. Migrations are idempotent and run at container startup (the games
# schema via ensureSchema, better-auth via getMigrations), so every deploy
# migrates. Requires repo secrets DROPLET_HOST and DEPLOY_SSH_KEY.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/virgilvox/doot-games

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm -r typecheck

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Stage compose + Caddyfile on the droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'docker/docker-compose.deploy.yml,docker/Caddyfile'
          target: '/opt/doot/_stage'
          strip_components: 1
      - name: Pull + restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            mkdir -p /opt/doot/data
            cp /opt/doot/_stage/docker-compose.deploy.yml /opt/doot/docker-compose.yml
            cp /opt/doot/_stage/Caddyfile /opt/doot/Caddyfile
            cd /opt/doot
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
